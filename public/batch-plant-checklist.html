<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aussieblock — Daily Plant Checklist</title>
<style>
  :root{
    --navy-deep:#161d27; --navy:#1e2939; --navy-line:rgba(255,255,255,.10);
    --orange:#e7732a; --orange-hot:#FB7013; --green:#27c08a; --red:#ef5350;
    --tile:#222730;
    --sans:"Helvetica Neue",Helvetica,Arial,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--navy-deep); color:#fff; font-family:var(--sans);
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    font-size:15px; line-height:1.4;
  }
  .wrap{max-width:720px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  /* header */
  header{background:var(--orange); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .brand{display:flex; align-items:center; gap:11px;}
  .brand svg{display:block;}
  .brand .t1{color:var(--navy-deep); font-weight:800; font-size:19px; letter-spacing:.02em; line-height:1;}
  .brand .t2{color:var(--navy-deep); opacity:.72; font-weight:700; font-size:11px; letter-spacing:.02em; margin-top:2px;}
  .tabs{display:flex; border-bottom:1px solid var(--navy-line);}
  .tab{flex:1; appearance:none; background:none; border:none; cursor:pointer; color:rgba(255,255,255,.45); font-family:var(--sans); font-weight:800; font-size:14px; padding:12px 0; border-bottom:2px solid transparent;}
  .tab.on{color:var(--orange); border-bottom-color:var(--orange);}
  .tab:focus-visible{outline:2px solid #fff; outline-offset:-4px;}

  main{padding:18px; flex:1;}
  .toast{border-radius:9px; padding:9px 12px; font-size:13px; margin-bottom:14px;}
  .toast.ok{background:rgba(39,192,138,.14); color:var(--green);}
  .toast.err{background:rgba(239,83,80,.14); color:#ff8a85;}

  .meta{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .meta .full{grid-column:1 / -1;}
  label.k{display:block; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:5px;}
  input,textarea{width:100%; background:var(--navy); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:9px; padding:10px 12px; font-family:var(--sans); font-size:15px; outline:none;}
  input:focus,textarea:focus{border-color:var(--orange);}
  textarea{resize:vertical;}
  .subtle{color:rgba(255,255,255,.4); font-size:12px; margin:8px 0 18px;}

  section.card{margin-bottom:18px;}
  .card-h{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .card-h .bar{width:16px; height:3px; background:var(--orange); border-radius:2px;}
  .card-h h2{margin:0; font-size:14px; font-weight:800; letter-spacing:.09em; text-transform:uppercase;}
  .card-h .note{margin-left:auto; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.35);}
  .card-body{background:var(--navy); border-radius:13px; padding:11px 13px;}
  .item{padding:10px 0; border-top:1px solid rgba(255,255,255,.06);}
  .item:first-child{border-top:none;}
  .item .lbl{font-size:14.5px; color:rgba(255,255,255,.9); line-height:1.3;}

  .seg{display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-top:8px;}
  .seg button{appearance:none; cursor:pointer; border-radius:9px; padding:9px 0; font-family:var(--sans); font-weight:800; font-size:13px; background:var(--navy-deep); color:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.12);}
  .seg button[data-st="issue"]{border-color:rgba(239,83,80,.35);}
  .seg button.on[data-st="ok"]{background:var(--green); color:var(--navy-deep); border-color:var(--green);}
  .seg button.on[data-st="na"]{background:#6b7683; color:#fff; border-color:#6b7683;}
  .seg button.on[data-st="issue"]{background:var(--red); color:#fff; border-color:var(--red);}
  .seg button:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  .rec{display:flex; align-items:center; gap:10px;}
  .rec .lbl{flex:1;}
  .rec input{width:92px; text-align:right;}
  .rec .unit{width:34px; color:rgba(255,255,255,.45); font-size:13px;}

  .counts{display:flex; justify-content:space-between; align-items:center; font-size:13px; margin:4px 0 12px;}
  .counts .issues{color:#ff8a85; font-weight:800;}
  .actions{display:grid; grid-template-columns:1fr auto auto; gap:10px;}
  .btn{appearance:none; cursor:pointer; border:none; border-radius:11px; padding:13px 16px; font-family:var(--sans); font-weight:800; font-size:14.5px; display:inline-flex; align-items:center; justify-content:center; gap:7px;}
  .btn.primary{background:var(--orange); color:var(--navy-deep);}
  .btn.ghost{background:var(--navy); color:#fff; border:1px solid rgba(255,255,255,.14);}
  .btn:disabled{opacity:.5; cursor:default;}
  .btn:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  /* history */
  .hrow{width:100%; text-align:left; background:var(--navy); border:1px solid rgba(255,255,255,.06); border-radius:12px; padding:11px 13px; margin-bottom:9px; display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; color:#fff;}
  .hrow .hd{font-weight:800; font-size:15px;}
  .hrow .hs{color:rgba(255,255,255,.45); font-size:12.5px; margin-top:2px;}
  .badge{border-radius:999px; padding:3px 10px; font-size:11px; font-weight:800; white-space:nowrap;}
  .badge.clear{background:rgba(39,192,138,.14); color:var(--green);}
  .badge.iss{background:rgba(239,83,80,.16); color:#ff8a85;}
  .empty{color:rgba(255,255,255,.4); text-align:center; padding:36px 0;}
  .back{background:none; border:none; color:var(--orange); font-weight:700; font-size:13px; cursor:pointer; padding:0; margin-bottom:14px;}
  .drow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px dotted rgba(255,255,255,.08); font-size:13.5px;}
  .drow .dl{color:rgba(255,255,255,.75); line-height:1.3;}
  .pill{border-radius:999px; padding:2px 9px; font-size:11px; font-weight:800; white-space:nowrap;}
  .hidden{display:none !important;}

  @media (max-width:480px){ .meta{grid-template-columns:1fr;} .actions{grid-template-columns:1fr;} }

  @media print{
    body{background:#fff; color:#000;}
    header{background:var(--orange);}
    .tabs,.actions,.counts,.back,.tab{display:none !important;}
    .card-body,input,textarea,.hrow{background:#fff; border:1px solid #ccc; color:#000;}
    .item .lbl,.rec .unit,.drow .dl{color:#000;}
    .seg button{background:#fff; color:#333; border:1px solid #bbb;}
    label.k,.subtle,.card-h .note{color:#444;}
  }
</style>
</head>

      </svg>
      <div>
        <div class="t1">AUSSIEBLOCK</div>
        <div class="t2">Daily Plant Checklist · Moby 1500</div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab on" data-view="form" type="button">Today's checklist</button>
    <button class="tab" data-view="history" type="button">History</button>
  </nav>

  <main>
    <div id="toast" class="toast hidden"></div>

    <!-- ── FORM ── -->
    <div id="view-form">
      <div class="meta">
        <div class="full">
          <label class="k" for="operator">Operator</label>
          <input id="operator" placeholder="your name" autocomplete="off" />
        </div>
        <div>
          <label class="k" for="date">Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label class="k" for="ambient">Ambient temp (°F)</label>
          <input id="ambient" inputmode="numeric" placeholder="°F" />
        </div>
        <div class="full">
          <label class="k" for="weather">Weather</label>
          <input id="weather" placeholder="clear / rain / wind…" />
        </div>
      </div>
      <p class="subtle">Fill it out at the start of each shift, then Save. Records are kept on this device.</p>

      <div id="sections"></div>

      <label class="k" for="notes">Deficiencies &amp; corrective action</label>
      <textarea id="notes" rows="3" placeholder="Note anything flagged as an Issue, and what was done about it…"></textarea>

      <div class="counts">
        <span id="marked">0/0 items marked</span>
        <span id="issues" class="issues hidden"></span>
      </div>
      <div class="actions">
        <button class="btn primary" id="save" type="button">Save checklist</button>
        <button class="btn ghost" id="print" type="button">Print</button>
        <button class="btn ghost" id="clear" type="button">New</button>
      </div>
    </div>

    <!-- ── HISTORY LIST ── -->
    <div id="view-history" class="hidden">
      <div id="history-list"></div>
    </div>

    <!-- ── HISTORY DETAIL ── -->
    <div id="view-detail" class="hidden">
      <button class="back" id="detail-back" type="button">‹ All checklists</button>
      <div id="detail-body"></div>
    </div>
  </main>
</div>

<script>
(function(){
  "use strict";
  var CHECKLIST = [
    { title:"Safety & Housekeeping", items:[
      { key:"estops", label:"Emergency stops (E-stops) tested & functional" },
      { key:"guards", label:"Guards & covers secured on moving parts" },
      { key:"walkways", label:"Ladders, platforms & walkways clear" },
      { key:"water_filters", label:"Fresh water filters checked & clean" },
      { key:"leaks", label:"No fuel / oil / hydraulic leaks" },
      { key:"extinguisher", label:"Fire extinguisher charged & accessible" },
      { key:"ppe", label:"PPE on hand (eye, hearing, gloves, hard hat)" },
      { key:"firstaid", label:"First-aid kit stocked" }
    ]},
    { title:"Plant Equipment", items:[
      { key:"cement_scale", label:"Cement scale zeroed & swings free" },
      { key:"agg_scale", label:"Aggregate scale zeroed & swings free" },
      { key:"water_meter", label:"Water meter / weigh batcher operating" },
      { key:"admix_disp", label:"Admixture dispensers primed, lines clear" },
      { key:"mixer", label:"Mixer paddles / liners — wear & buildup OK" },
      { key:"conveyors", label:"Charge & discharge conveyors / belts OK" },
      { key:"air_comp", label:"Air compressor pressure normal; tanks drained" },
      { key:"dust", label:"Dust collector / silo baghouse operating" },
      { key:"control", label:"Control system boots & batch tickets print" },
      { key:"water_supply_filters", label:"Water supply line filters checked & clean" }
    ]},
    { title:"Materials & Inventory", note:"record level", items:[
      { key:"cement_silo", label:"Cement silo level", rec:true, unit:"ton" },
      { key:"slag_silo", label:"Slag / fly ash silo level", rec:true, unit:"ton" },
      { key:"rock_bin", label:"Coarse aggregate (rock) bin", rec:true, unit:"%" },
      { key:"sand_bin", label:"Fine aggregate (sand) bin", rec:true, unit:"%" },
      { key:"admix_tanks", label:"Admixture tank levels", rec:true, unit:"gal" },
      { key:"water_supply", label:"Water supply pressure / available", rec:true, unit:"psi" },
      { key:"contamination", label:"Materials free of contamination / frozen lumps" },
      { key:"silo_filters", label:"Silo filters & pressure relief checked" }
    ]},
    { title:"Quality Control / TxDOT", note:"first batch", items:[
      { key:"scale_verify", label:"Scale accuracy verified with test weights" },
      { key:"sand_moisture", label:"Sand (fine agg) moisture", rec:true, unit:"%" },
      { key:"rock_moisture", label:"Rock (coarse agg) moisture", rec:true, unit:"%" },
      { key:"moisture_comp", label:"Moisture compensation set in batcher" },
      { key:"slump", label:"First-batch slump", rec:true, unit:"in" },
      { key:"air_content", label:"First-batch air content", rec:true, unit:"%" },
      { key:"temp", label:"First-batch concrete temperature", rec:true, unit:"°F" },
      { key:"calibration", label:"Calibration records current (scales, meters, admix)" }
    ]}
  ];
  var STATUS = { ok:{l:"OK"}, na:{l:"N/A"}, issue:{l:"Issue"} };
  var HKEY = "abplant_history", OKEY = "abplant_operator";
  var ALL_CHECKS = [];
  CHECKLIST.forEach(function(s){ s.items.forEach(function(i){ if(!i.rec) ALL_CHECKS.push(i.key); }); });

  var state = { items:{}, readings:{} };
  var $ = function(id){ return document.getElementById(id); };
  var esc = function(t){ var d=document.createElement("div"); d.textContent=t==null?"":String(t); return d.innerHTML; };

  function todayStr(){
    var d=new Date(), m=("0"+(d.getMonth()+1)).slice(-2), day=("0"+d.getDate()).slice(-2);
    return d.getFullYear()+"-"+m+"-"+day;
  }
  function usDate(s){ if(!s) return ""; var p=s.split("-"); return p.length===3 ? p[1]+"/"+p[2]+"/"+p[0] : s; }
  function whenStr(iso){ try{ return new Date(iso).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }catch(e){ return iso; } }
  function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HKEY)||"[]"); }catch(e){ return []; } }
  function saveHistory(a){ try{ localStorage.setItem(HKEY, JSON.stringify(a.slice(0,90))); }catch(e){} }

  function toast(text, ok){
    var t=$("toast"); t.textContent=text; t.className="toast "+(ok?"ok":"err");
    if(text) t.classList.remove("hidden"); else t.classList.add("hidden");
  }

  function renderSections(){
    var html = CHECKLIST.map(function(sec){
      var rows = sec.items.map(function(it){
        if(it.rec){
          return '<div class="item rec"><span class="lbl">'+esc(it.label)+'</span>'+
                 '<input data-rec="'+it.key+'" inputmode="decimal" placeholder="—" />'+
                 '<span class="unit">'+esc(it.unit)+'</span></div>';
        }
        var segs = ["ok","na","issue"].map(function(st){
          return '<button type="button" data-item="'+it.key+'" data-st="'+st+'">'+STATUS[st].l+'</button>';
        }).join("");
        return '<div class="item"><div class="lbl">'+esc(it.label)+'</div><div class="seg">'+segs+'</div></div>';
      }).join("");
      return '<section class="card"><div class="card-h"><span class="bar"></span><h2>'+esc(sec.title)+'</h2>'+
             (sec.note?'<span class="note">'+esc(sec.note)+'</span>':'')+'</div>'+
             '<div class="card-body">'+rows+'</div></section>';
    }).join("");
    $("sections").innerHTML = html;
  }

  function refreshCounts(){
    var marked=0, issues=0;
    ALL_CHECKS.forEach(function(k){ if(state.items[k]){ marked++; if(state.items[k]==="issue") issues++; } });
    var m=$("marked");
    m.textContent = marked+"/"+ALL_CHECKS.length+" items marked";
    m.style.color = marked===ALL_CHECKS.length ? "var(--green)" : "rgba(255,255,255,.5)";
    var ie=$("issues");
    if(issues){ ie.textContent = issues+" issue"+(issues>1?"s":"")+" flagged"; ie.classList.remove("hidden"); }
    else ie.classList.add("hidden");
  }

  // status taps (event delegation)
  $("sections").addEventListener("click", function(e){
    var b = e.target.closest("button[data-item]"); if(!b) return;
    var key=b.getAttribute("data-item"), st=b.getAttribute("data-st");
    state.items[key] = (state.items[key]===st) ? undefined : st;
    var group = b.parentNode;
    Array.prototype.forEach.call(group.querySelectorAll("button"), function(x){
      x.classList.toggle("on", state.items[key] === x.getAttribute("data-st"));
    });
    refreshCounts();
  });
  // readings
  $("sections").addEventListener("input", function(e){
    var i = e.target.closest("input[data-rec]"); if(!i) return;
    state.readings[i.getAttribute("data-rec")] = i.value;
  });

  function resetForm(keepOperator){
    state = { items:{}, readings:{} };
    if(!keepOperator) $("operator").value="";
    $("ambient").value=""; $("weather").value=""; $("notes").value="";
    $("date").value = todayStr();
    renderSections(); refreshCounts(); toast("", true);
  }

  $("save").addEventListener("click", function(){
    var op = $("operator").value.trim();
    if(!op){ toast("Enter the operator's name.", false); window.scrollTo(0,0); return; }
    var items={}; Object.keys(state.items).forEach(function(k){ if(state.items[k]) items[k]=state.items[k]; });
    var readings={}; Object.keys(state.readings).forEach(function(k){ var v=(state.readings[k]||"").trim(); if(v) readings[k]=v; });
    var issues = Object.keys(items).filter(function(k){ return items[k]==="issue"; }).length;
    var rec = {
      id: Date.now(), date: $("date").value || todayStr(), operator: op,
      ambient: $("ambient").value.trim(), weather: $("weather").value.trim(),
      items: items, readings: readings, notes: $("notes").value.trim(),
      savedAt: new Date().toISOString()
    };
    var hist = loadHistory(); hist.unshift(rec); saveHistory(hist);
    try{ localStorage.setItem(OKEY, op); }catch(e){}
    resetForm(true);            // clears the toast, so set the confirmation AFTER
    $("operator").value = op;
    toast("Saved for "+usDate(rec.date)+(issues?(" — "+issues+" issue"+(issues>1?"s":"")+" flagged"):"")+".", true);
    window.scrollTo(0,0);
  });

  $("print").addEventListener("click", function(){ window.print(); });
  $("clear").addEventListener("click", function(){ resetForm(false); window.scrollTo(0,0); });

  // ── views ──
  function show(view){
    $("view-form").classList.toggle("hidden", view!=="form");
    $("view-history").classList.toggle("hidden", view!=="history");
    $("view-detail").classList.add("hidden");
    Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(t){
      t.classList.toggle("on", t.getAttribute("data-view")===view);
    });
    if(view==="history") renderHistory();
    if(view!=="form") toast("", true);
  }
  Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(t){
    t.addEventListener("click", function(){ show(t.getAttribute("data-view")); });
  });

  function renderHistory(){
    var hist = loadHistory(), box=$("history-list");
    if(!hist.length){ box.innerHTML = '<div class="empty">No checklists saved on this device yet.</div>'; return; }
    box.innerHTML = hist.map(function(r){
      var issues = Object.keys(r.items||{}).filter(function(k){ return r.items[k]==="issue"; }).length;
      var badge = issues ? '<span class="badge iss">'+issues+' issue'+(issues>1?'s':'')+'</span>'
                         : '<span class="badge clear">✓ Clear</span>';
      return '<button class="hrow" type="button" data-id="'+r.id+'">'+
             '<span><span class="hd">'+esc(usDate(r.date))+'</span>'+
             '<div class="hs">'+esc(r.operator||"—")+' · '+esc(whenStr(r.savedAt))+'</div></span>'+badge+'</button>';
    }).join("");
  }
  $("history-list").addEventListener("click", function(e){
    var b=e.target.closest(".hrow[data-id]"); if(!b) return;
    var rec = loadHistory().filter(function(r){ return String(r.id)===b.getAttribute("data-id"); })[0];
    if(rec) renderDetail(rec);
  });
  $("detail-back").addEventListener("click", function(){ show("history"); });

  function renderDetail(r){
    $("view-history").classList.add("hidden");
    $("view-detail").classList.remove("hidden");
    var head = '<section class="card"><div class="card-body">'+
      '<div class="hd" style="font-size:17px;font-weight:800;">'+esc(usDate(r.date))+'</div>'+
      '<div class="hs" style="color:rgba(255,255,255,.55);font-size:13px;margin-top:3px;">Operator: '+esc(r.operator||"—")+' · '+esc(whenStr(r.savedAt))+'</div>'+
      '<div class="hs" style="color:rgba(255,255,255,.55);font-size:13px;">'+esc([r.ambient?r.ambient+"°F":"", r.weather].filter(Boolean).join(" · ")||"—")+'</div>'+
      '</div></section>';
    var body = CHECKLIST.map(function(sec){
      var rows = sec.items.map(function(it){
        var right;
        if(it.rec){
          var v=(r.readings||{})[it.key];
          right = v ? '<span class="pill" style="background:transparent;color:#fff;">'+esc(v)+' '+esc(it.unit)+'</span>'
                    : '<span style="color:rgba(255,255,255,.3);font-size:12px;">—</span>';
        } else {
          var st=(r.items||{})[it.key];
          if(st==="ok") right='<span class="pill" style="background:var(--green);color:var(--navy-deep);">OK</span>';
          else if(st==="na") right='<span class="pill" style="background:#6b7683;color:#fff;">N/A</span>';
          else if(st==="issue") right='<span class="pill" style="background:var(--red);color:#fff;">Issue</span>';
          else right='<span style="color:rgba(255,255,255,.3);font-size:12px;">—</span>';
        }
        return '<div class="drow"><span class="dl">'+esc(it.label)+'</span>'+right+'</div>';
      }).join("");
      return '<div style="margin-bottom:14px;"><div class="k" style="margin:0 0 6px;">'+esc(sec.title)+'</div>'+rows+'</div>';
    }).join("");
    var notes = r.notes ? '<section class="card"><div class="card-body"><div class="k" style="margin-bottom:6px;">Deficiencies &amp; corrective action</div><div style="white-space:pre-wrap;">'+esc(r.notes)+'</div></div></section>' : "";
    $("detail-body").innerHTML = head + body + notes;
    window.scrollTo(0,0);
  }

  // init
  $("date").value = todayStr();
  var lastOp = localStorage.getItem(OKEY); if(lastOp) $("operator").value = lastOp;
  renderSections(); refreshCounts();
})();
</script>
</body>
</html>
